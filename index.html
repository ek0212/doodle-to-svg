<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doodle to SVG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Doodle to SVG</h1>
      <p class="subtitle">Upload a photo of your doodles, circle the ones you want, get SVGs.</p>
    </header>

    <div id="upload-zone" class="upload-zone">
      <div class="upload-content">
        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 16V4m0 0L8 8m4-4l4 4"/>
          <path d="M2 17l.621 2.485A2 2 0 004.561 21h14.878a2 2 0 001.94-1.515L22 17"/>
        </svg>
        <p>Drop image here or <label for="file-input" class="browse-link">browse</label></p>
        <p class="hint">PNG, JPG, HEIC — photos of hand-drawn doodles work best</p>
      </div>
      <input type="file" id="file-input" accept="image/*" hidden>
    </div>

    <!-- Drawing stage -->
    <div id="draw-section" class="draw-section hidden">
      <div class="draw-header">
        <h2 id="draw-title">Draw around each icon</h2>
        <div class="draw-actions">
          <button id="btn-undo" class="btn btn-ghost btn-sm">Undo</button>
          <button id="btn-clear" class="btn btn-ghost btn-sm">Clear All</button>
        </div>
      </div>
      <p class="draw-hint">Circle each icon you want to trace. Click an existing region to remove it.</p>
      <div class="draw-canvas-wrap">
        <canvas id="draw-canvas"></canvas>
      </div>
      <div class="draw-controls">
        <div class="control-group">
          <label for="threshold">B/W Threshold</label>
          <input type="range" id="threshold" min="50" max="220" value="128">
          <span id="threshold-val">128</span>
        </div>
        <div class="control-group">
          <label for="padding">Padding (px)</label>
          <input type="range" id="padding" min="0" max="40" value="10">
          <span id="padding-val">10</span>
        </div>
      </div>
      <div class="button-row">
        <button id="btn-trace-whole" class="btn btn-ghost">Trace Whole Page</button>
        <button id="btn-trace-regions" class="btn btn-accent" disabled>Trace Regions</button>
        <button id="btn-new-image" class="btn btn-ghost">New Image</button>
      </div>
    </div>

    <div id="preview-section" class="preview-section hidden">
      <div class="preview-header">
        <h2 id="result-title">Preview</h2>
        <div class="preview-actions">
          <button id="btn-back-draw" class="btn btn-ghost btn-sm">Back to Drawing</button>
          <button id="btn-download-all" class="btn btn-primary btn-sm hidden">Download All (.zip)</button>
        </div>
      </div>
      <div id="preview-grid" class="preview-grid"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer_v1.2.6.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
